{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4">
    <h1 class="mb-4">{{ titulo }}</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <p>¿Seguro que deseas eliminar la calificación <strong>{{ item }}</strong>?</p>

            <form method="post">
                {% csrf_token %}
                <button class="btn btn-danger" type="submit">Sí, eliminar</button>
                <a class="btn btn-secondary" href="{% url 'calificaciones' %}">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
