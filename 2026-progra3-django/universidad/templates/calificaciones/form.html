{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4">
    <h1 class="mb-4">{{ titulo }}</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <button class="btn btn-primary" type="submit">Guardar</button>
                <a class="btn btn-secondary" href="{% url 'calificaciones' %}">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
